    {day:'Sat Apr 25', sessionType:'🔥 DOUBLES SIM WITH JADE', duration:'90-120 mins', intensity:'90-95% Race Effort', notes:'FULL MIXED DOUBLES SIMULATION WITH JADE @ 90-95% effort.\n\nWarm-up: 15min together + full dynamic + 4x100m strides\n\n⚡ MIXED DOUBLES RULES: Woman completes 60% of station work, Man 40%.\nJade has a 1:19 doubles PR — she knows this format. Let her lead the strategy on splits.\n\nFull 8-station run-through at agreed splits.\nRun pace: Both @ 5:25-5:30/km\n\n30min debrief:\n• Record ALL station times and run splits\n• Transitions smooth?\n• Any adjustments for race day?\n• Jade leads the debrief — defer to her doubles experience'},
    {day:'Sun Apr 26', sessionType:'REST', duration:'', intensity:'None', notes:'Full rest. Last hard effort done. Taper begins tomorrow.\n\nHydrate 4L. Sleep 9+ hours. Review sim data with Jade.'}
  ],
  9: [
    {day:'Mon Apr 27', sessionType:'Hyrox Class — Very Light', duration:'60 mins', intensity:'Low', notes:'FINAL TAPER WEEK. Attend class at 60% maximum. Movement only — no intensity, no competition with yourself or anyone else. Feel the stations but leave nothing here.'},
    {day:'Tue Apr 28', sessionType:'Easy Shakeout', duration:'20 mins', intensity:'Very Low — Zone 1-2', notes:'15-20min jog @ 6:20/km, HR under 125. ~3km. Just moving legs. Add 4x80m strides at the end.'},
    {day:'Wed Apr 29', sessionType:'REST', duration:'', intensity:'None', notes:'Complete rest. Hydration 3-4L. Carb loading starts today — rice, pasta, oats at every meal. Sleep 8+ hours.'},
    {day:'Thu Apr 30', sessionType:'Final Shakeout + Strides', duration:'15 mins', intensity:'Very Low', notes:'Jog 10min @ 6:30/km + 3x80m strides building to race pace feel.\n\nLegs should feel like springs. If they feel flat, have an extra gel and sleep more tonight.'},
    {day:'Fri May 1', sessionType:'REST — Race Eve', duration:'', intensity:'None', notes:'ZERO activity.\n\nCarb load dinner at 6pm. Lay out all race kit:\n• Bib, shoes (race-tested), socks, shorts, shirt\n• Watch charged\n• Gels ready\n\nConfirm meet time and warm-up plan with Jade.\nSet 3 alarms. Bed by 9pm.\n\nYOU ARE READY.'},
    {day:'Sat May 2', sessionType:'🏆 RACE DAY — Jade Mixed Doubles', duration:'Target: Sub 1:15:00', intensity:'RACE EFFORT', notes:'THIS IS IT. 🔥\n\nPRE-RACE:\n• Wake 4hrs before start\n• Breakfast: Porridge + banana + coffee\n• Arrive venue 90min early\n• Warm-up with Jade: 10min progressive jog, full dynamic drills, 4x100m strides, light station touches if permitted\n• Gel 15min before start\n\nRACE:\n• Execute the plan you rehearsed in simulation\n• Jade leads on transitions — she has the doubles experience\n• Run strong between every station — this is where your training shows\n• When it hurts on stations 6-8: the compromised running sessions were built for exactly this moment\n\n🎯 TARGET: SUB 1:15:00\n\nTrust your training. Trust your partner. Leave nothing on the floor. 💪🔥'},
    {day:'Sun May 3', sessionType:'REST — Celebrate', duration:'', intensity:'None', notes:'TWO RACES DONE. 🎉\n\nFull rest. Hydrate. Recover. Celebrate with Jade and your team.\n\nYou completed:\n✅ Hyrox Doubles — Stuart (Mar 29)\n✅ Hyrox Mixed Doubles — Jade (May 2)\n\nWhat\'s next? 🏆'}
  ]
};

// ─── JADE PROFILE ────────────────────────────────────────────────
// Solo: 1:27 | Mixed doubles PR: 1:19
// Mixed doubles rules: Woman = 60% station work, Man = 40%
// Jade carries more stations — plays to her experience
// Joint target: Sub 1:15:00
// Jade run pace (from 1:27 solo): ~5:30-5:40/km Hyrox runs
// Tony run pace: 5:20-5:30/km → both should be comfortable at 5:25-5:30/km together

// ─── HEART RATE REFERENCE ─────────────────────────────────────────
const hrZones = [
  {zone:'Z1', label:'Recovery', range:'<109 bpm', color:'#888', pct:'<60%'},
  {zone:'Z2', label:'Aerobic Base', range:'109-127 bpm', color:'#4ade80', pct:'60-70%'},
  {zone:'Z3', label:'Tempo', range:'127-145 bpm', color:'#facc15', pct:'70-80%'},
  {zone:'Z4', label:'Threshold', range:'145-163 bpm', color:'#fb923c', pct:'80-90%'},
  {zone:'Z5', label:'Race / VO2', range:'163-181 bpm', color:'#f43f5e', pct:'90-100%'}
];

// ─── COMPONENTS ──────────────────────────────────────────────────
function WorkoutCard({day, isComplete, onToggle}) {
  const [open, setOpen] = useState(false);
  if (!day || !day.sessionType) return null;
  const isRest = day.intensity === 'None' || day.sessionType === 'REST';
  const isRace = day.sessionType.includes('RACE') || day.sessionType.includes('🏆');
  const isSim = day.sessionType.includes('DOUBLES SIM') || day.sessionType.includes('🤝') || day.sessionType.includes('🔥');

  const borderCol = isComplete ? C : isRace ? '#ffd700' : isSim ? '#a855f7' : '#333';

  return (
    <div className="border-2 rounded-lg p-4 transition" style={{backgroundColor:'#1a1a1a', borderColor: borderCol}}>
      <div className="flex items-start gap-3">
        <button onClick={onToggle} className="flex-shrink-0 mt-1 w-6 h-6 rounded border-2 flex items-center justify-center"
          style={isComplete ? {backgroundColor: C, borderColor: C} : {borderColor: C}}>
          {isComplete && <span style={{color:'#fff', fontSize:'12px'}}>✓</span>}
        </button>
        <div className="flex-1">
          <div className="flex items-start justify-between mb-1">
            <div>
              <div className="font-bold text-white">{day.day}</div>
              <div className="text-sm" style={{color: isRace ? '#ffd700' : isSim ? '#a855f7' : '#999'}}>{day.sessionType}</div>
            </div>
            {day.duration && <div className="text-xs text-gray-500 ml-2 flex-shrink-0">{day.duration}</div>}
          </div>
          {!isRest && (
            <div className="mt-2 mb-2">
              <span className="text-xs px-2 py-1 rounded-full" style={{backgroundColor:'#2a2a2a', color: isRace ? '#ffd700' : C}}>{day.intensity}</span>
            </div>
          )}
          {day.notes && (
            <button onClick={() => setOpen(!open)} className="text-xs font-semibold mt-1" style={{color: C}}>
              {open ? '▼ Hide Details' : '▶ Show Full Workout'}
            </button>
          )}
          {open && day.notes && (
            <div className="mt-3 p-3 rounded text-sm text-gray-200 whitespace-pre-line border max-h-96 overflow-y-auto"
              style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}>
              {day.notes}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function HRReference() {
  const [open, setOpen] = useState(false);
  return (
    <div className="border-2 rounded-lg mb-4" style={{borderColor:'#333', backgroundColor:'#1a1a1a'}}>
      <button onClick={() => setOpen(!open)} className="w-full p-3 flex items-center justify-between text-sm font-semibold text-gray-300">
        <span><InfoIcon s={16} style={{display:'inline', marginRight:'6px'}}/>HR Zones (Max 181 bpm — Age 39)</span>
        <span style={{color: C}}>{open ? '▼' : '▶'}</span>
      </button>
      {open && (
        <div className="px-3 pb-3 space-y-2">
          {hrZones.map(z => (
            <div key={z.zone} className="flex items-center gap-3 text-sm">
              <span className="font-bold w-6" style={{color: z.color}}>{z.zone}</span>
              <span className="text-gray-400 w-28">{z.label}</span>
              <span className="text-white font-mono">{z.range}</span>
              <span className="text-gray-500 text-xs">{z.pct}</span>
            </div>
          ))}
          <div className="mt-2 pt-2 border-t text-xs text-gray-500" style={{borderColor:'#333'}}>
            5k best: 24:33 → Hyrox run target: 5:20-5:30/km
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('plan');
  const [week, setWeek] = useState(1);
  const [comp, setComp] = useState({});
  const [workouts, setWorkouts] = useState([]);
  const [showLog, setShowLog] = useState(false);
  const [logData, setLogData] = useState({date: new Date().toISOString().split('T')[0], type:'', duration:'', notes:''});

  useEffect(() => {
    try {
      setComp(JSON.parse(localStorage.getItem('tony26_comp') || '{}'));
      setWorkouts(JSON.parse(localStorage.getItem('tony26_workouts') || '[]'));
    } catch(e) {}
  }, []);

  useEffect(() => { localStorage.setItem('tony26_comp', JSON.stringify(comp)); }, [comp]);
  useEffect(() => { localStorage.setItem('tony26_workouts', JSON.stringify(workouts)); }, [workouts]);

  const toggleComp = (w, i) => setComp(p => ({...p, [`${w}-${i}`]: !p[`${w}-${i}`]}));
  const isComp = (w, i) => !!comp[`${w}-${i}`];

  const getCompletion = (w) => {
    const plan = plans[w];
    if (!plan) return {completed:0, total:0, pct:0};
    const filtered = plan.filter(d => d.sessionType);
    const c = filtered.filter((_, i) => isComp(w, i)).length;
    return {completed: c, total: filtered.length, pct: filtered.length ? Math.round(c/filtered.length*100) : 0};
  };

  const totalCompleted = Object.values(comp).filter(Boolean).length;
  const currentPhase = phases[week];
  const currentPlan = (plans[week] || []).filter(d => d.sessionType);
  const isPhase1 = week <= 4;

  const logWorkout = () => {
    if (!logData.type) return;
    setWorkouts([{...logData, id: Date.now()}, ...workouts]);
    setLogData({date: new Date().toISOString().split('T')[0], type:'', duration:'', notes:''});
    setShowLog(false);
  };

  return (
    <div className="min-h-screen p-4" style={{background:'#0a0a0a'}}>
      <div className="max-w-2xl mx-auto pb-20">

        {/* Header */}
        <div className="mb-6">
          <div className="flex items-center gap-3 mb-4">
            <FlameIcon s={40} style={{color: C}}/>
            <div>
              <h1 className="text-3xl font-bold" style={{color: C}}>Tony's Training</h1>
              <p className="text-sm text-gray-400">Hyrox Doubles 2026 — 9-Week Program</p>
            </div>
          </div>

          {/* Athlete card */}
          <div className="border-2 rounded-lg p-4 mb-4" style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>
            <div className="grid grid-cols-3 gap-3 text-sm">
              <div><div className="text-gray-500 text-xs">Age / Weight</div><div className="text-white font-semibold">39 / 88kg</div></div>
              <div><div className="text-gray-500 text-xs">5k Best</div><div className="font-semibold" style={{color: C}}>24:33</div></div>
              <div><div className="text-gray-500 text-xs">Max HR</div><div className="text-white font-semibold">181 bpm</div></div>
            </div>
          </div>

          {/* Race targets */}
          <div className="grid grid-cols-2 gap-3 mb-4">
            <div className="border-2 rounded-lg p-3" style={{borderColor: C, backgroundColor:'#1a1a1a'}}>
              <div className="text-xs text-gray-400 mb-1">Race 1 — Mar 29</div>
              <div className="font-bold text-white">Stuart Doubles</div>
              <div className="text-lg font-bold" style={{color: C}}>Sub 1:15:00</div>
            </div>
            <div className="border-2 rounded-lg p-3" style={{borderColor:'#a855f7', backgroundColor:'#1a1a1a'}}>
              <div className="text-xs text-gray-400 mb-1">Race 2 — May 2</div>
              <div className="font-bold text-white">Jade Mixed Doubles</div>
              <div className="text-lg font-bold" style={{color:'#a855f7'}}>Sub 1:15:00</div>
              <div className="text-xs text-gray-500 mt-1">Jade: Solo 1:27 · Doubles PR 1:19</div>
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="border-2 rounded-lg p-3 text-center" style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>
              <div className="text-2xl font-bold" style={{color: C}}>{totalCompleted}</div>
              <div className="text-xs text-gray-400">Sessions Done</div>
            </div>
            <div className="border-2 rounded-lg p-3 text-center" style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>
              <div className="text-2xl font-bold" style={{color: C}}>{getCompletion(week).pct}%</div>
              <div className="text-xs text-gray-400">This Week</div>
            </div>
            <div className="border-2 rounded-lg p-3 text-center" style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>
              <div className="text-2xl font-bold" style={{color: C}}>{9 - week + 1}</div>
              <div className="text-xs text-gray-400">Weeks Left</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div className="flex gap-2 mb-5 border-b-2" style={{borderColor:'#333'}}>
          {[['plan', CalIcon, 'Plan'], ['log', PlusIcon, 'Log'], ['history', TrendIcon, 'History']].map(([t, I, label]) => (
            <button key={t} onClick={() => setTab(t)}
              className={`px-5 py-3 font-semibold ${tab===t ? 'border-b-2' : ''}`}
              style={tab===t ? {borderBottomColor: C, color: C} : {color:'#666'}}>
              <I s={16} style={{display:'inline', marginRight:'5px'}}/>{label}
            </button>
          ))}
        </div>

        {/* Plan Tab */}
        {tab === 'plan' && (
          <div>
            <HRReference/>

            {/* Phase divider */}
            <div className="flex gap-2 mb-4">
              <button onClick={() => setWeek(1)}
                className="flex-1 py-2 rounded-lg text-sm font-semibold border-2"
                style={isPhase1 ? {backgroundColor: C, borderColor: C, color:'#000'} : {backgroundColor:'#1a1a1a', borderColor:'#333', color:'#666'}}>
                Phase 1: Stuart (Mar 29)
              </button>
              <button onClick={() => setWeek(5)}
                className="flex-1 py-2 rounded-lg text-sm font-semibold border-2"
                style={!isPhase1 ? {backgroundColor:'#a855f7', borderColor:'#a855f7', color:'#fff'} : {backgroundColor:'#1a1a1a', borderColor:'#333', color:'#666'}}>
                Phase 2: Jade (May 2)
              </button>
            </div>

            {/* Week selector */}
            <div className="flex items-center gap-2 mb-5">
              <button onClick={() => setWeek(Math.max(1, week-1))} disabled={week===1}
                className="px-3 py-2 border-2 rounded text-white disabled:opacity-30"
                style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>←</button>
              <div className="flex-1 flex gap-2 overflow-x-auto pb-1">
                {[...Array(9)].map((_, i) => {
                  const w = i+1;
                  const c = getCompletion(w);
                  const isRaceWk = w === 4 || w === 9;
                  const isSimWk = w === 2 || w === 8;
                  const label = isRaceWk ? '🏆' : isSimWk ? '🤝' : '';
                  return (
                    <button key={w} onClick={() => setWeek(w)}
                      className="flex-shrink-0 px-3 py-2 rounded-lg font-semibold text-sm border-2"
                      style={week===w ? {backgroundColor: C, borderColor: C, color:'#000'} : {backgroundColor:'#1a1a1a', borderColor:'#333', color:'#fff'}}>
                      <div>{label}W{w}</div>
                      {c.completed > 0 && <div className="text-xs opacity-70">{c.pct}%</div>}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setWeek(Math.min(9, week+1))} disabled={week===9}
                className="px-3 py-2 border-2 rounded text-white disabled:opacity-30"
                style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>→</button>
            </div>

            {/* Phase info */}
            {currentPhase && (
              <div className="border-2 rounded-lg p-4 mb-4" style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}>
                <div className="flex items-start justify-between">
                  <div>
                    <div className="text-2xl font-bold" style={{color: C}}>Week {week}</div>
                    <div className="text-xs text-gray-500 mb-2">{currentPhase.dates}</div>
                    <div className="font-semibold" style={{color: week <= 4 ? C : '#a855f7'}}>{currentPhase.phase}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs text-gray-400">Target</div>
                    <div className="font-bold text-white text-sm">{currentPhase.intensity}</div>
                    <div className="text-xs mt-1" style={{color: week <= 4 ? C : '#a855f7'}}>{getCompletion(week).completed}/{getCompletion(week).total} done</div>
                  </div>
                </div>
                <div className="mt-3 text-xs text-gray-400 italic">{currentPhase.notes}</div>
              </div>
            )}

            {/* Workout cards */}
            <div className="space-y-3">
              {currentPlan.map((day, i) => (
                <WorkoutCard key={`${week}-${i}`} day={day} isComplete={isComp(week, i)} onToggle={() => toggleComp(week, i)}/>
              ))}
            </div>
          </div>
        )}

        {/* Log Tab */}
        {tab === 'log' && (
          <div>
            {!showLog ? (
              <button onClick={() => setShowLog(true)} className="w-full py-10 border-2 border-dashed rounded-lg flex flex-col items-center gap-2"
                style={{borderColor: C, backgroundColor:'#1a1a1a'}}>
                <PlusIcon s={32} style={{color: C}}/>
                <span className="text-lg font-semibold" style={{color: C}}>Log Workout</span>
              </button>
            ) : (
              <div className="space-y-4">
                <h3 className="text-xl font-bold" style={{color: C}}>Log Workout</h3>
                {[['date','date','Date'],['type','','Type'],['duration','number','Duration (min)']].map(([field, type, label]) =>
                  field === 'type' ? (
                    <div key={field}>
                      <label className="block text-sm font-medium mb-2 text-white">{label}</label>
                      <select value={logData.type} onChange={e => setLogData({...logData, type: e.target.value})}
                        className="w-full text-white rounded px-4 py-2 border-2" style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}>
                        <option value="">Select...</option>
                        {['Hyrox Class','Running — Zone 2','Running — Tempo','Running — Intervals','Compromised Running','Upper Strength','Lower Strength','Doubles Session','Active Recovery','REST'].map(o => <option key={o} value={o}>{o}</option>)}
                      </select>
                    </div>
                  ) : (
                    <div key={field}>
                      <label className="block text-sm font-medium mb-2 text-white">{label}</label>
                      <input type={type} value={logData[field]} onChange={e => setLogData({...logData, [field]: e.target.value})}
                        className="w-full text-white rounded px-4 py-2 border-2" style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}/>
                    </div>
                  )
                )}
                <div>
                  <label className="block text-sm font-medium mb-2 text-white">Notes</label>
                  <textarea value={logData.notes} onChange={e => setLogData({...logData, notes: e.target.value})}
                    placeholder="How did it feel? Key times, HR data..." rows="3"
                    className="w-full text-white rounded px-4 py-2 border-2" style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}/>
                </div>
                <div className="flex gap-3">
                  <button onClick={logWorkout} className="flex-1 px-6 py-3 rounded-lg font-semibold" style={{backgroundColor: C, color:'#000'}}>Save</button>
                  <button onClick={() => setShowLog(false)} className="px-6 py-3 border-2 rounded-lg font-semibold text-white" style={{backgroundColor:'#1a1a1a', borderColor:'#333'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* History Tab */}
        {tab === 'history' && (
          <div>
            <h3 className="text-xl font-bold mb-4" style={{color: C}}>History</h3>
            {workouts.length === 0 ? (
              <div className="text-center py-12 text-gray-500">
                <ClockIcon s={48} style={{margin:'0 auto 12px', opacity:0.4}}/>
                <p>No workouts logged yet</p>
              </div>
            ) : (
              <div className="space-y-3">
                {workouts.map(w => (
                  <div key={w.id} className="border-2 rounded-lg p-4" style={{backgroundColor:'#0a0a0a', borderColor:'#333'}}>
                    <div className="flex justify-between mb-1">
                      <div className="font-bold text-white">{w.type}</div>
                      <div className="text-sm font-semibold" style={{color: C}}>{w.duration} min</div>
                    </div>
                    <div className="text-xs text-gray-500 mb-1">{new Date(w.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>
                    {w.notes && <div className="text-sm text-gray-300 mt-2 pt-2 border-t" style={{borderColor:'#333'}}>{w.notes}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
